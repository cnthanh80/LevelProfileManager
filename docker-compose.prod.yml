services:
  postgres:
    image: postgres:16-alpine
    container_name: lpm_postgres_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-level_profile_db}
      POSTGRES_USER: ${POSTGRES_USER:-lpm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lpm_user} -d ${POSTGRES_DB:-level_profile_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lpm_backend_prod
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      DEBUG: "false"
      RATE_LIMIT_ENABLED: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python -m app.db.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    container_name: lpm_frontend_prod
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data_prod:
